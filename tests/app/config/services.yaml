parameters:
  pimcore.encryption.secret: '%env(PIMCORE_ENCRYPTION_SECRET)%'

pimcore:
  product_registration:
    instance_identifier: '%env(PIMCORE_INSTANCE_IDENTIFIER)%'
    product_key: '%env(PIMCORE_PRODUCT_KEY)%'

services:
  _defaults:
    autowire: true
    autoconfigure: true

  Neusta\Pimcore\TranslationMigrationBundle\Source\SymfonySourceProvider:
    arguments:
      $resourceDirectories:
        - '%kernel.project_dir%/tests/translation-fixtures'
      $enabledLocales:
        - 'en'
